spring.application.name=Backend

# --- PostgreSQL Database Configuration ---
# Uses Render environment variables if available, otherwise defaults to local dev settings
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vylopdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:vylop_admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Flyway Configuration (Database Version Control) ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration
# Point Flyway directly to the env vars — do NOT nest property references
spring.flyway.url=${DB_URL:jdbc:postgresql://localhost:5432/vylopdb}
spring.flyway.user=${DB_USER:postgres}
spring.flyway.password=${DB_PASSWORD:vylop_admin}

logging.level.org.flywaydb=DEBUG

# --- Hibernate Settings ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Google OAuth2 Setup ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.config.import=optional:file:.env[.properties]