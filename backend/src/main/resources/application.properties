spring.application.name=Backend

# --- PostgreSQL Database Configuration ---
spring.datasource.url=jdbc:postgresql://localhost:5432/vylopdb
spring.datasource.username=postgres
spring.datasource.password=vylop_admin
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Flyway Configuration (Database Version Control) ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# --- Hibernate Settings ---
# Changed from 'update' to 'validate' so Flyway acts as the single source of truth
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Google OAuth2 Setup ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.config.import=optional:file:.env[.properties]